<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .navbar{
            background-color: rgb(14, 230, 68) !important;
            
        }
        .psw{
            background-color: rgb(193, 193, 193);

        }
        body{
            background-color: antiquewhite;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary ">
        <div class="container-fluid d-flex justify-content-center">
            <a class="navbar-brand " href="#">Password Generator</a>
        </div>
    </nav>

    <form class="passwordBlock m-5 " id="form">
        <div class="mb-3 ">
            <label for="formGroupExampleInput" class="form-label">Generted Password</label>
            <p class = "psw h-10 rounded-5 my-0 p-1 text-center"id="generted_password">choose alteast one option</p>
        </div>

        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">Length of the password</label>
            <input type="number" class="form-control" id="formGroupExampleInput2"
                placeholder="Another input placeholder" min="5" max="16" value="8">
        </div>

        <div class="input-group mb-3 d-flex flex-column">
            <div class="input-group-text d-flex justify-content-between rounded-5 my-2">
                Allow Lower Case Letters
                <input class="form-check-input mt-0 rounded-5" type="checkbox" id="lower" value="lowercaseletters"
                    aria-label="Checkbox for following text input">
            </div>
            <div class="input-group-text d-flex justify-content-between rounded-5 my-2">
                Allow Upper Case Letters
                <input class="form-check-input mt-0 rounded-5" type="checkbox" id="upper" value="uppercaseletters"
                    aria-label="Checkbox for following text input">
            </div>
            <div class="input-group-text d-flex justify-content-between rounded-5 my-2">
                Allow numbers
                <input class="form-check-input mt-0 rounded-5" type="checkbox" id="numb" value="numbercaseletters"
                    aria-label="Checkbox for following text input">
            </div>
            <div class="input-group-text d-flex justify-content-between rounded-5 my-2">
                Allow special characters
                <input class="form-check-input mt-0 rounded-5" type="checkbox" id="spl" value="specialcaseletters"
                    aria-label="Checkbox for following text input">
            </div>
        </div>

        <div class="col-auto d-flex justify-content-center">
            <button type="submit" class="btn btn-primary">Generate Password</button>
        </div>
    </form>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

<script>
    //create a javascript program capable of generating a password which contains alteast one lowercase, one upper case and one special character. create a password class to achive the same.

    class password {
        constructor(len, arr) {
            this.len = len
            this.arr = arr
        }
        passworg_gen() {
            full_password = ""
            for (let i = 0; i < this.len; i++) {
                let z = Math.floor(Math.random() * this.arr.length);
                console.log(this.arr[z], z);
                full_password = full_password + this.arr[z];
            }
            return full_password;
        }
    }
    let full_password = "";
    let num = "1234567890";
    let UCL = "ABCDEFGHTIJKLMNOPQRSTUVXYZ";
    let LCL = "abcdefghijklmnopqrstuvwxyz";
    let sc = "!@#$%^&*(){}|<>[]/?";
    let full_array = "";
    let len;
    let newnew;


    document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();
        len = document.getElementById("formGroupExampleInput2").value;
        let l = document.getElementById("lower").checked;
        let u = document.getElementById("upper").checked;
        let n = document.getElementById("numb").checked;
        let s = document.getElementById("spl").checked;
        full_array = ""
        if (l) {
            full_array = full_array + LCL
        }
        if (u) {
            full_array = full_array + UCL
        }
        if (n) {
            full_array = full_array + num
        }
        if (s) {
            full_array = full_array + sc
        }
        if (full_array == "") {
            console.log("enter a valid input")
        }
        else {
            console.log(len, full_array)
            let a = new password(len, full_array)
            newnew = a.passworg_gen()
            console.log(newnew)

        }
        if (newnew == undefined){
            document.getElementById("generted_password").innerHTML = `enter atleast one choose`
            document.getElementById("generted_password").style.backgroundColor="red";
            document.getElementById("generted_password").style.color="white"
        }else{
            document.getElementById("generted_password").innerHTML = `${newnew}`;
            document.getElementById("generted_password").style.backgroundColor="green"
            document.getElementById("generted_password").style.color="white"
        }
    })
</script>

</html>
